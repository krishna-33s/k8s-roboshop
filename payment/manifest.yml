apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-configmap
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment
    environment: dev

data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  # this labels is for replicaset
  labels:
    project: roboshop
    tier: backend
    component: payment
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      # these labels is for replicaset to select the pods
      project: roboshop
      tier: backend
      component: payment
      environment: dev
  template:
    metadata:
    # these for pod defination
      labels:
        project: roboshop
        tier: backend
        component: payment
        environment: dev
    spec:
      containers:
      - name: payment
        image: krishna88s/payment:1.1.0
        imagePullPolicy: Always
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 4
          periodSeconds: 10
          initialDelaySeconds: 15   
        livenessProbe: 
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 4
          periodSeconds: 10   
        envFrom:
        - configMapRef:
            name: payment-configmap

---

apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment
    environment: dev

spec:
  selector:
      project: roboshop
      tier: backend
      component: payment
      environment: dev

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

