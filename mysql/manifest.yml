apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  # this labels is for replicaset
  labels:
    project: roboshop
    tier: database
    component: mysql
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      # these labels is for replicaset to select the pods
      project: roboshop
      tier: database
      component: mysql
      environment: dev
  template:
    metadata:
    # these for pod defination
      labels:
        project: roboshop
        tier: database
        component: mysql
        environment: dev
    spec:
      containers:
      - name: mysql
        image: krishna88s/mysql:1.1.0
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 3306
          failureThreshold: 4
          periodSeconds: 10 


---

apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
      project: roboshop
      tier: database
      component: mysql
      environment: dev

  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306

