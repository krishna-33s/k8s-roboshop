apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  # this labels is for replicaset
  labels:
    project: roboshop
    tier: database
    component: mongodb
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      # these labels is for replicaset to select the pods
      project: roboshop
      tier: database
      component: mongodb
      environment: dev
  template:
    metadata:
    # these for pod defination
      labels:
        project: roboshop
        tier: database
        component: mongodb
        environment: dev
    spec:
      containers:
      - name: mongodb
        image: krishna88s/mongodb:1.1.0
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 27017
          failureThreshold: 4
          periodSeconds: 10 


---

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: mongodb
    environment: dev
spec:
  selector:
      project: roboshop
      tier: database
      component: mongodb
      environment: dev

  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017

