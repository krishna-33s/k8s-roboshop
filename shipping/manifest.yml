apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping-configmap
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: shipping
    environment: dev

data:
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  # this labels is for replicaset
  labels:
    project: roboshop
    tier: backend
    component: shipping
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      # these labels is for replicaset to select the pods
      project: roboshop
      tier: backend
      component: shipping
      environment: dev
  template:
    metadata:
    # these for pod defination
      labels:
        project: roboshop
        tier: backend
        component: shipping
        environment: dev
    spec:
      containers:
      - name: shipping
        image: krishna88s/shipping:1.1.0
        imagePullPolicy: Always
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 4
          periodSeconds: 10
          initialDelaySeconds: 15   
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 25
          periodSeconds: 10    
        livenessProbe: 
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 4
          periodSeconds: 10   
        envFrom:
        - configMapRef:
            name: shipping-configmap

---

apiVersion: v1
kind: Service
metadata:
  name: shipping
  namespace: roboshop
spec:
  selector:
      project: roboshop
      tier: backend
      component: shipping
      environment: dev

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

