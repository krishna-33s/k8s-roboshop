apiVersion: v1
kind: ConfigMap
metadata:
  name: user-configmap
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: user
    environment: dev

data:
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  # this labels is for replicaset
  labels:
    project: roboshop
    tier: backend
    component: user
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      # these labels is for replicaset to select the pods
      project: roboshop
      tier: backend
      component: user
      environment: dev
  template:
    metadata:
    # these for pod defination
      labels:
        project: roboshop
        tier: backend
        component: user
        environment: dev
    spec:
      containers:
      - name: user
        image: krishna88s/user:1.1.0
        imagePullPolicy: Always
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 4
          periodSeconds: 10
          initialDelaySeconds: 15   
        livenessProbe: 
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 4
          periodSeconds: 10   
        envFrom:
        - configMapRef:
            name: user-configmap

---

apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop
spec:
  selector:
      project: roboshop
      tier: backend
      component: user
      environment: dev

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

