apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-configmap
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
    environment: dev

data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  # this labels is for replicaset
  labels:
    project: roboshop
    tier: backend
    component: cart
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      # these labels is for replicaset to select the pods
      project: roboshop
      tier: backend
      component: cart
      environment: dev
  template:
    metadata:
    # these for pod defination
      labels:
        project: roboshop
        tier: backend
        component: cart
        environment: dev
    spec:
      containers:
      - name: cart
        image: krishna88s/cart:1.1.0
        imagePullPolicy: Always
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 4
          periodSeconds: 10
          initialDelaySeconds: 15   
        livenessProbe: 
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 4
          periodSeconds: 10   
        envFrom:
        - configMapRef:
            name: cart-configmap

---

apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
    environment: dev
spec:
  selector:
      project: roboshop
      tier: backend
      component: cart
      environment: dev

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

