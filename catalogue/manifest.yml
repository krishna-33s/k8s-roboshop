apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue-configmap
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
    environment: dev

data:
  MONGO: "true"
  MONGO_URL: "mongodb://<MONGODB-SERVER-IPADDRESS>:27017/catalogue"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  # this labels is for replicaset
  labels:
    project: roboshop
    tier: backend
    component: catalogue
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      # these labels is for replicaset to select the pods
      project: roboshop
      tier: backend
      component: catalogue
      environment: dev
  template:
    metadata:
    # these for pod defination
      labels:
        project: roboshop
        tier: backend
        component: catalogue
        environment: dev
    spec:
      containers:
      - name: catalogue
        image: krishna88s/catalogue:1.0
        envFrom:
        - configMapRef:
            name: catalogue-config

---

apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
spec:
  selector:
      project: roboshop
      tier: backend
      component: catalogue
      environment: dev

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

